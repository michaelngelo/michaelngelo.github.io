<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字幻燈片展示器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+HK:wght@400;500;700&family=Chiron+Sung+HK:wght@400;500;700&family=Source+Han+Sans+TC:wght@400;500;700&family=ZCOOL+Xiaowei&family=Ma+Shan+Zheng&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>

    <div class="container" id="main-ui">
        <header>
            <h1>文字幻燈片展示器</h1>
            <p class="header-subtitle">整理靈感，快速切換成沉浸式展示</p>
        </header>

        <tab-manager id="tab-manager"></tab-manager>

        <div class="controls">
            <div class="control-group">
                <label for="column-select">欄位數量:</label>
                <select id="column-select">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="control-group control-group--range">
                <label for="font-size-slider">字體大小:</label>
                <input type="range" id="font-size-slider" min="1" max="10" step="0.1" value="3">
                <span id="font-size-value">3.0 rem</span>
            </div>
            <div class="control-group">
                <label for="font-family-select">字體樣式:</label>
                <select id="font-family-select">
                    <option value='&quot;Noto Serif HK&quot;, serif' selected>Noto Serif Hong Kong（線上字型）</option>
                    <option value='&quot;ZCOOL Xiaowei&quot;, serif'>ZCOOL Xiaowei（線上字型）</option>
                    <option value='&quot;Chiron Sung HK&quot;, serif'>Chiron Sung HK（線上字型）</option>
                    <option value='&quot;LXGW WenKai TC&quot;, sans-serif'>LXGW WenKai TC（線上字型）</option>
                    <option value='&quot;Klee One&quot;, sans-serif'>Klee One（線上字型）</option>
                    <option value='&quot;Ma Shan Zheng&quot;, cursive'>Ma Shan Zheng（線上字型）</option>
                    <option value='&quot;Noto Sans TC&quot;, sans-serif'>Noto Sans TC（線上字型）</option>
                    <option value='&quot;Source Han Sans TC&quot;, sans-serif'>Source Han Sans TC（線上字型）</option>
                    <option value='&quot;PingFang TC&quot;, sans-serif'>PingFang TC</option>
                    <option value='Microsoft JhengHei, &quot;PingFang TC&quot;, sans-serif'>微軟正黑體</option>
                    <option value='&quot;MingLiU&quot;, serif'>細明體</option>
                    <option value='system-ui, sans-serif'>系統預設</option>
                </select>
            </div>
            <div class="control-group control-group--color-pair">
                <div class="color-picker-block">
                    <label for="bg-color-picker">背景顏色:</label>
                    <button type="button" class="color-picker-btn" id="bg-color-picker-btn" data-color-input="bg-color-picker" aria-label="選擇背景顏色">
                        <span class="color-swatch" id="bg-color-swatch"></span>
                        <span class="color-picker-label">選擇</span>
                    </button>
                    <input type="color" id="bg-color-picker" value="#111111" hidden>
                </div>
                <div class="color-picker-block">
                    <label for="text-color-picker">文字顏色:</label>
                    <button type="button" class="color-picker-btn" id="text-color-picker-btn" data-color-input="text-color-picker" aria-label="選擇文字顏色">
                        <span class="color-swatch" id="text-color-swatch"></span>
                        <span class="color-picker-label">選擇</span>
                    </button>
                    <input type="color" id="text-color-picker" value="#ffffff" hidden>
                </div>
            </div>
            <div class="control-group">
                <label for="bg-image-picker">背景圖片:</label>
                <button type="button" class="color-picker-btn" id="bg-image-picker-btn" aria-label="選擇背景圖片">
                    <span class="color-picker-label" id="bg-image-picker-label">選擇</span>
                </button>
                <button type="button" class="clear-image-btn" id="clear-bg-image-btn" aria-label="清除背景圖片">清除</button>
                <div class="bg-image-preview" id="bg-image-preview" aria-hidden="true"></div>
                <input type="file" id="bg-image-picker" accept="image/*" hidden>
            </div>
            <div class="control-group">
                <button id="start-btn">進入幻燈片模式</button>
            </div>
        </div>

        <div id="input-container" class="input-grid">
            <!-- JS will generate content -->
        </div>
    </div>

    <div id="slideshow-screen" class="slideshow-overlay" style="display: none;">
        <button class="slide-nav-btn" id="prev-slide-btn">&lt;</button>
        <div id="slideshow-render-area" class="slideshow-content"></div>
        <button class="slide-nav-btn" id="next-slide-btn">&gt;</button>
        <div class="slideshow-footer">
            <button class="exit-btn" id="exit-slideshow-btn" aria-label="關閉幻燈片" title="關閉幻燈片">×</button>
            <div class="page-indicator" id="slide-page-indicator"></div>
        </div>
    </div>

</body>
</html>
