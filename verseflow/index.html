<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerseFlow - Lyric Presenter</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #5b7cff;
            --accent-hover: #4a65d8;
            --live-color: #ff4b4b;
            --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-lyric: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* --- DASHBOARD MODE --- */
        .dashboard {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid #333;
        }

        .header-title { font-size: 1.2rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .badge { background: var(--accent); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }

        .controls { display: flex; gap: 16px; align-items: center; }
        select, button {
            background: #2a2a2a; color: white; border: 1px solid #444;
            padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; cursor: pointer;
        }
        button.primary { background: var(--accent); border-color: var(--accent); font-weight: bold; }
        button.primary:hover { background: var(--accent-hover); }

        .workspace { display: flex; flex: 1; min-height: 0; }

        .editor-pane {
            flex: 1; display: flex; flex-direction: column;
            border-right: 1px solid #333; background: var(--bg-dark);
        }
        
        .editor-header { padding: 10px 16px; background: #1a1a1a; font-size: 0.85rem; color: var(--text-muted); border-bottom: 1px solid #333; }
        
        textarea {
            flex: 1; width: 100%; padding: 20px;
            background: transparent; color: var(--text-main);
            border: none; resize: none; font-family: monospace; font-size: 1rem; line-height: 1.6;
        }
        textarea:focus { outline: none; }

        .preview-pane {
            flex: 1; display: flex; flex-direction: column; background: #181818; overflow-y: auto;
            padding: 20px; gap: 12px;
        }

        .slide-card {
            background: var(--bg-panel); border: 2px solid transparent;
            border-radius: 8px; padding: 16px; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        
        .slide-card:hover { border-color: #444; }
        .slide-card.preview { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(91,124,255,0.3); }
        .slide-card.live { border-color: var(--live-color); }
        
        .slide-label { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }
        .slide-content { font-size: 1.1rem; line-height: 1.4; pointer-events: none; }
        
        .status-badge {
            position: absolute; top: 12px; right: 12px;
            font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; display: none;
        }
        .slide-card.live .status-badge { display: block; background: var(--live-color); color: white; }
        
        .hotkey-hints {
            padding: 12px 24px; background: var(--bg-panel); border-top: 1px solid #333;
            font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 20px;
        }

        /* --- PROJECTOR MODE --- */
        .projector {
            display: none; height: 100vh; width: 100vw;
            align-items: center; justify-content: center;
            text-align: center; padding: 40px; box-sizing: border-box;
        }
        
        .projector-text {
            font-size: clamp(3rem, 6vw, 7rem); font-family: var(--font-lyric);
            font-weight: bold; white-space: pre-wrap; line-height: 1.3;
        }

        .chord { color: #ffeb3b; font-size: 0.5em; vertical-align: super; font-family: monospace; margin-right: 2px; }

        /* Themes */
        .theme-dark { background-color: #000; color: #fff; }
        .theme-karaoke { background-color: #000; color: #ffeb3b; text-shadow: 4px 4px 0px #ff0055; font-family: sans-serif; }
        .theme-cinematic { background: radial-gradient(circle, #2c3e50 0%, #000000 100%); color: #fdf6e3; font-family: "Georgia", serif; }

    </style>
</head>
<body>

    <div id="dashboard-ui" class="dashboard">
        <header>
            <div class="header-title">VerseFlow <span class="badge">PWA</span></div>
            <div class="controls">
                <label style="font-size: 0.9rem;">
                    <input type="checkbox" id="chords-toggle"> Show Chords
                </label>
                <select id="theme-select">
                    <option value="theme-dark">Dark Stage (Default)</option>
                    <option value="theme-karaoke">Karaoke Bold</option>
                    <option value="theme-cinematic">Cinematic Serif</option>
                </select>
                <button class="primary" id="cast-btn">Launch Projector</button>
            </div>
        </header>

        <div class="workspace">
            <div class="editor-pane">
                <div class="editor-header">Type lyrics here. Double line break = New Slide. Use # for sections (e.g., # Chorus). Chords in [brackets].</div>
                <textarea id="lyric-editor">
# Verse 1
Amazing grace, how sweet the sound
That saved a wretch like [C]me

# Chorus
I once was [G]lost, but now am found
Was blind, but now I [C]see

# Verse 2
'Twas grace that taught my heart to fear
And grace my fears relieved</textarea>
            </div>
            <div class="preview-pane" id="slide-list">
                </div>
        </div>

        <div class="hotkey-hints">
            <span><strong>Enter:</strong> Go Live</span>
            <span><strong>Space / Right:</strong> Next Slide</span>
            <span><strong>Up / Down:</strong> Move Cursor</span>
            <span><strong>C:</strong> Chorus | <strong>V / 1-9:</strong> Verse | <strong>B:</strong> Bridge</span>
        </div>
    </div>

    <div id="projector-ui" class="projector">
        <div id="projector-content" class="projector-text"></div>
    </div>

    <script>
        const isProjector = new URLSearchParams(window.location.search).get('mode') === 'projector';
        const channel = new BroadcastChannel('verseflow_channel');

        if (isProjector) {
            document.title = "Projector - VerseFlow";
            document.getElementById('dashboard-ui').style.display = 'none';
            const projUI = document.getElementById('projector-ui');
            const projContent = document.getElementById('projector-content');
            projUI.style.display = 'flex';

            channel.onmessage = (e) => {
                if (e.data.type === 'UPDATE_SLIDE') {
                    projUI.className = `projector ${e.data.theme}`;
                    projContent.innerHTML = e.data.html;
                }
            };
        } else {
            // --- DASHBOARD LOGIC ---
            const editor = document.getElementById('lyric-editor');
            const slideList = document.getElementById('slide-list');
            const themeSelect = document.getElementById('theme-select');
            const chordsToggle = document.getElementById('chords-toggle');
            const castBtn = document.getElementById('cast-btn');

            let slides = [];
            let previewIndex = 0;
            let liveIndex = -1;

            function parseText() {
                const text = editor.value;
                const blocks = text.split(/\n\s*\n/);
                
                slides = blocks.map((block, idx) => {
                    let label = '';
                    let content = block.trim();
                    if (content.startsWith('#')) {
                        const lines = content.split('\n');
                        label = lines[0].replace('#', '').trim();
                        content = lines.slice(1).join('\n').trim();
                    }
                    return { id: idx, label, content };
                }).filter(s => s.content || s.label);
                
                renderSlideList();
            }

            function formatContent(text) {
                let html = text.replace(/\n/g, '<br>');
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                if (chordsToggle.checked) {
                    html = html.replace(/\[(.*?)\]/g, '<span class="chord">$1</span>');
                } else {
                    html = html.replace(/\[(.*?)\]/g, ''); // Hide chords
                }
                return html;
            }

            function renderSlideList() {
                slideList.innerHTML = '';
                slides.forEach((slide, index) => {
                    const el = document.createElement('div');
                    el.className = 'slide-card';
                    if (index === previewIndex) el.classList.add('preview');
                    if (index === liveIndex) el.classList.add('live');
                    
                    let innerHTML = `<div class="status-badge">LIVE</div>`;
                    if (slide.label) innerHTML += `<div class="slide-label">${slide.label}</div>`;
                    innerHTML += `<div class="slide-content">${formatContent(slide.content)}</div>`;
                    
                    el.innerHTML = innerHTML;
                    el.onclick = () => { previewIndex = index; updateSelection(); };
                    slideList.appendChild(el);
                });
                scrollToPreview();
            }

            function updateSelection() {
                Array.from(slideList.children).forEach((el, index) => {
                    el.classList.toggle('preview', index === previewIndex);
                    el.classList.toggle('live', index === liveIndex);
                });
                scrollToPreview();
            }

            function scrollToPreview() {
                const activeEl = slideList.children[previewIndex];
                if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function goLive(index) {
                if (index < 0 || index >= slides.length) return;
                liveIndex = index;
                previewIndex = index; // Auto-follow
                updateSelection();
                
                const slide = slides[liveIndex];
                channel.postMessage({
                    type: 'UPDATE_SLIDE',
                    html: formatContent(slide.content),
                    theme: themeSelect.value
                });
            }

            function jumpToSection(keyword) {
                const index = slides.findIndex(s => s.label.toLowerCase().includes(keyword));
                if (index !== -1) {
                    previewIndex = index;
                    updateSelection();
                }
            }

            // Listeners
            editor.addEventListener('input', parseText);
            themeSelect.addEventListener('change', () => goLive(liveIndex));
            chordsToggle.addEventListener('change', () => { renderSlideList(); goLive(liveIndex); });
            
            castBtn.addEventListener('click', () => {
                window.open(window.location.href + '?mode=projector', 'projectorWindow', 'width=1280,height=720');
            });

            // Keyboard Shortcuts
            document.addEventListener('keydown', (e) => {
                if (document.activeElement === editor) return; // Don't trigger if typing

                const key = e.key.toLowerCase();
                
                if (key === 'arrowup') { previewIndex = Math.max(0, previewIndex - 1); updateSelection(); e.preventDefault(); }
                if (key === 'arrowdown') { previewIndex = Math.min(slides.length - 1, previewIndex + 1); updateSelection(); e.preventDefault(); }
                if (key === 'enter') { goLive(previewIndex); e.preventDefault(); }
                if (key === ' ' || key === 'arrowright') { goLive(Math.min(slides.length - 1, liveIndex + 1)); e.preventDefault(); }
                if (key === 'arrowleft') { goLive(Math.max(0, liveIndex - 1)); e.preventDefault(); }

                // Section Hotkeys
                if (key === 'c') jumpToSection('chorus');
                if (key === 'v') jumpToSection('verse');
                if (key >= '1' && key <= '9') jumpToSection(`verse ${key}`);
                if (key === 'b') jumpToSection('bridge');
                if (key === 'i') jumpToSection('intro');
                if (key === 'o') jumpToSection('outro');
            });

            // Init
            parseText();

            // PWA Registration
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('Service Worker Registered'))
                    .catch(err => console.error('Service Worker Failed', err));
            }
        }
    </script>
</body>
</html>
