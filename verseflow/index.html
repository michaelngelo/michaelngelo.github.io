<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerseFlow - Lyric Presenter</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #5b7cff;
            --accent-hover: #4a65d8;
            --live-color: #ff4b4b;
            --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-lyric: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* --- DASHBOARD MODE --- */
        .dashboard { display: flex; flex-direction: column; height: 100%; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px; background-color: var(--bg-panel); border-bottom: 1px solid #333;
        }

        .controls { display: flex; gap: 16px; align-items: center; }
        select, button, input[type="range"] {
            background: #2a2a2a; color: white; border: 1px solid #444;
            padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; cursor: pointer;
        }
        
        /* Font Slider Styling */
        input[type="range"] { padding: 0; height: 24px; width: 100px; cursor: ew-resize; }
        
        button.primary { background: var(--accent); border-color: var(--accent); font-weight: bold; }
        button.primary:hover { background: var(--accent-hover); }

        .workspace { display: flex; flex: 1; min-height: 0; }

        /* --- SETLIST PANE --- */
        .setlist-pane {
            width: 220px; display: flex; flex-direction: column;
            border-right: 1px solid #333; background: #151515;
        }
        .setlist-header {
            padding: 10px 16px; background: #1a1a1a; font-size: 0.85rem; color: var(--text-muted);
            border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;
        }
        .btn-small { background: var(--accent); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        
        .setlist-items { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .song-item {
            padding: 10px; background: #222; border-radius: 6px; cursor: pointer;
            font-size: 0.9rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center;
            border: 1px solid transparent;
        }
        .song-item:hover { border-color: #444; }
        .song-item.active { background: #2a2a2a; color: white; border-color: var(--accent); font-weight: bold; }
        .delete-btn { color: #ff4b4b; background: none; border: none; font-weight: bold; cursor: pointer; padding: 0 4px; font-size: 1.1rem; }
        .delete-btn:hover { text-shadow: 0 0 5px red; }

        /* Drag & Drop Styling */
        .drag-handle {
            cursor: grab;
            color: #666;
            font-size: 1.1rem;
            padding-right: 8px;
            user-select: none;
        }
        .drag-handle:active { cursor: grabbing; }

        .song-item.dragging {
            opacity: 0.4;
            border: 2px dashed var(--accent);
        }

        .song-item.drag-over {
            border-top: 2px solid var(--accent);
        }

        .editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; background: var(--bg-dark); }
        .editor-header { padding: 10px 16px; background: #1a1a1a; font-size: 0.85rem; color: var(--text-muted); border-bottom: 1px solid #333; }
        textarea {
            flex: 1; width: 100%; padding: 20px; background: transparent; color: var(--text-main);
            border: none; resize: none; font-family: monospace; font-size: 1rem; line-height: 1.6;
        }
        textarea:focus { outline: none; }

        .preview-pane { flex: 1; display: flex; flex-direction: column; background: #181818; overflow-y: auto; padding: 20px; gap: 12px; }
        .slide-card {
            background: var(--bg-panel); border: 2px solid transparent; border-radius: 8px; padding: 16px; cursor: pointer; position: relative;
        }
        .slide-card:hover { border-color: #444; }
        .slide-card.preview { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(91,124,255,0.3); }
        .slide-card.live { border-color: var(--live-color); }
        .slide-label { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }
        .slide-content { font-size: 1.1rem; line-height: 1.4; pointer-events: none; }
        .status-badge { position: absolute; top: 12px; right: 12px; font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; display: none; }
        .slide-card.live .status-badge { display: block; background: var(--live-color); color: white; }
        
        .hotkey-hints { padding: 12px 24px; background: var(--bg-panel); border-top: 1px solid #333; font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 20px; align-items: center; justify-content: space-between; }
        .brand { font-weight: bold; color: #555; text-decoration: none; }
        .brand:hover { color: var(--accent); }

        /* --- PROJECTOR MODE --- */
        .projector { display: none; height: 100vh; width: 100vw; align-items: center; justify-content: center; text-align: center; padding: 40px; box-sizing: border-box; }
        /* Font size is now dynamically overridden by JavaScript, default fallback provided here */
        .projector-text { font-size: 6vw; font-family: var(--font-lyric); font-weight: bold; white-space: pre-wrap; line-height: 1.3; transition: font-size 0.2s ease; }
        .chord { color: #ffeb3b; font-size: 0.5em; vertical-align: super; font-family: monospace; margin-right: 2px; }

        /* Themes */
        .theme-dark { background-color: #000; color: #fff; }
        .theme-karaoke { background-color: #000; color: #ffeb3b; text-shadow: 4px 4px 0px #ff0055; font-family: sans-serif; }
        .theme-cinematic { background: radial-gradient(circle, #2c3e50 0%, #000000 100%); color: #fdf6e3; font-family: "Georgia", serif; }

    </style>
</head>
<body>

    <div id="dashboard-ui" class="dashboard">
        <header>
            <div class="controls">
                <label style="font-size: 0.9rem;"><input type="checkbox" id="chords-toggle"> Show Chords</label>
                
                <!-- NEW: Font Size Slider -->
                <label style="font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                    Size: <input type="range" id="font-size-slider" min="3" max="12" step="0.5" value="6">
                </label>

                <select id="theme-select">
                    <option value="theme-dark">Dark Stage (Default)</option>
                    <option value="theme-karaoke">Karaoke Bold</option>
                    <option value="theme-cinematic">Cinematic Serif</option>
                </select>
            </div>
            <button class="primary" id="cast-btn">Launch Projector</button>
        </header>

        <div class="workspace">
            <div class="setlist-pane">
                <div class="setlist-header">
                    <span>Setlist</span>
                    <button id="add-song-btn" class="btn-small">+ Add</button>
                </div>
                <div id="setlist-container" class="setlist-items"></div>
            </div>

            <div class="editor-pane">
                <div class="editor-header">Top line is Song Title. Double enter = New Slide. # = Section. [Chords]</div>
                <textarea id="lyric-editor"></textarea>
            </div>

            <div class="preview-pane" id="slide-list"></div>
        </div>

        <div class="hotkey-hints">
            <div>
                <span><strong>Enter:</strong> Go Live | </span>
                <span><strong>Space / Right:</strong> Next Slide | </span>
                <span><strong>Up / Down:</strong> Move Cursor | </span>
                <span><strong>C:</strong> Chorus | <strong>V:</strong> Verse | <strong>B:</strong> Bridge</span>
            </div>
            <a href="#" class="brand">⚡ VerseFlow</a>
        </div>
    </div>

    <!-- PROJECTOR UI -->
    <div id="projector-ui" class="projector">
        <div id="projector-content" class="projector-text"></div>
    </div>

    <script>
        const isProjector = new URLSearchParams(window.location.search).get('mode') === 'projector';
        const channel = new BroadcastChannel('verseflow_channel');

        if (isProjector) {
            document.title = "Projector - VerseFlow";
            document.getElementById('dashboard-ui').style.display = 'none';
            const projUI = document.getElementById('projector-ui');
            const projContent = document.getElementById('projector-content');
            projUI.style.display = 'flex';

            channel.onmessage = (e) => {
                if (e.data.type === 'UPDATE_SLIDE') {
                    projUI.className = `projector ${e.data.theme}`;
                    projContent.innerHTML = e.data.html;
                    // Apply the new font size
                    if (e.data.fontSize) projContent.style.fontSize = e.data.fontSize;
                } else if (e.data.type === 'CLEAR_SLIDE') {
                    projContent.innerHTML = '';
                }
            };
        } else {
            // --- DASHBOARD LOGIC ---
            const editor = document.getElementById('lyric-editor');
            const slideList = document.getElementById('slide-list');
            const setlistContainer = document.getElementById('setlist-container');
            const themeSelect = document.getElementById('theme-select');
            const chordsToggle = document.getElementById('chords-toggle');
            const fontSizeSlider = document.getElementById('font-size-slider');
            
            let slides = [];
            let previewIndex = 0;
            let liveIndex = -1;
            let liveSongId = null;

            const defaultSong = { 
                id: Date.now(), 
                title: "Amazing Grace", 
                lyrics: "Amazing Grace\n\n# Verse 1\nAmazing grace, how sweet the sound\nThat saved a wretch like [C]me\n\n# Chorus\nI once was [G]lost, but now am found\nWas blind, but now I [C]see"
            };
            
            let setlist = JSON.parse(localStorage.getItem('verseflow_setlist')) || [defaultSong];
            let activeSongId = setlist[0]?.id;

            function saveSetlist() {
                localStorage.setItem('verseflow_setlist', JSON.stringify(setlist));
            }

            let draggedIndex = null;

            function renderSetlist() {
                setlistContainer.innerHTML = '';
                setlist.forEach((song, index) => {
                    const el = document.createElement('div');
                    el.className = `song-item ${song.id === activeSongId ? 'active' : ''}`;
                    el.draggable = true; // Enable native HTML5 dragging
                    el.dataset.index = index;

                    // Grip Handle
                    const handle = document.createElement('span');
                    handle.className = 'drag-handle';
                    handle.innerHTML = '⋮⋮';

                    // Title
                    const titleSpan = document.createElement('span');
                    titleSpan.textContent = song.title || "Untitled";
                    titleSpan.style.flex = '1';

                    // Delete Button
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerHTML = '×';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        if(confirm(`Delete "${song.title}"?`)) {
                            setlist = setlist.filter(s => s.id !== song.id);
                            if(setlist.length === 0) setlist = [{ id: Date.now(), title: "New Song", lyrics: "New Song\n\n# Verse 1\n..." }];
                            if(activeSongId === song.id) loadSong(setlist[0].id);
                            else renderSetlist();
                            saveSetlist();
                        }
                    };

                    // --- DRAG AND DROP EVENTS ---
                    el.addEventListener('dragstart', (e) => {
                        draggedIndex = index;
                        el.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });

                    el.addEventListener('dragend', () => {
                        el.classList.remove('dragging');
                        document.querySelectorAll('.song-item').forEach(i => i.classList.remove('drag-over'));
                    });

                    el.addEventListener('dragover', (e) => {
                        e.preventDefault(); // Necessary to allow drop
                        el.classList.add('drag-over');
                    });

                    el.addEventListener('dragleave', () => {
                        el.classList.remove('drag-over');
                    });

                    el.addEventListener('drop', (e) => {
                        e.preventDefault();
                        el.classList.remove('drag-over');
                        
                        const targetIndex = index;
                        if (draggedIndex === null || draggedIndex === targetIndex) return;

                        // Reorder the array in memory
                        const draggedSong = setlist.splice(draggedIndex, 1)[0];
                        setlist.splice(targetIndex, 0, draggedSong);

                        saveSetlist();
                        renderSetlist();
                    });

                    el.appendChild(handle);
                    el.appendChild(titleSpan);
                    el.appendChild(delBtn);
                    el.onclick = () => loadSong(song.id);
                    
                    setlistContainer.appendChild(el);
                });
            }

            function loadSong(id) {
                activeSongId = id;
                const song = setlist.find(s => s.id === id);
                editor.value = song.lyrics;
                previewIndex = 0;
                if (activeSongId !== liveSongId) liveIndex = -1;
                renderSetlist();
                parseText();
            }

            document.getElementById('add-song-btn').addEventListener('click', () => {
                const newSong = { id: Date.now(), title: "New Song", lyrics: "New Song\n\n# Verse 1\nType lyrics here..." };
                setlist.push(newSong);
                saveSetlist();
                loadSong(newSong.id);
            });

            function parseText() {
                const text = editor.value;
                const lines = text.split('\n');
                const firstLine = lines[0].trim();
                const activeSong = setlist.find(s => s.id === activeSongId);
                
                if (activeSong && activeSong.title !== firstLine) {
                    activeSong.title = firstLine || "Untitled";
                    activeSong.lyrics = text;
                    saveSetlist();
                    renderSetlist();
                } else if (activeSong) {
                    activeSong.lyrics = text;
                    saveSetlist();
                }

                const blocks = text.split(/\n\s*\n/);
                slides = blocks.map((block, idx) => {
                    let label = '';
                    let content = block.trim();
                    if (content.startsWith('#')) {
                        const blockLines = content.split('\n');
                        label = blockLines[0].replace('#', '').trim();
                        content = blockLines.slice(1).join('\n').trim();
                    }
                    return { id: idx, label, content };
                }).filter(s => s.content || s.label);
                
                renderSlideList();
            }

            function formatContent(text) {
                let html = text.replace(/\n/g, '<br>');
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                if (chordsToggle.checked) html = html.replace(/\[(.*?)\]/g, '<span class="chord">$1</span>');
                else html = html.replace(/\[(.*?)\]/g, ''); 
                return html;
            }

            function renderSlideList() {
                slideList.innerHTML = '';
                slides.forEach((slide, index) => {
                    const el = document.createElement('div');
                    el.className = 'slide-card';
                    if (index === previewIndex) el.classList.add('preview');
                    if (index === liveIndex && activeSongId === liveSongId) el.classList.add('live');
                    
                    let innerHTML = `<div class="status-badge">LIVE</div>`;
                    if (slide.label) innerHTML += `<div class="slide-label">${slide.label}</div>`;
                    innerHTML += `<div class="slide-content">${formatContent(slide.content)}</div>`;
                    
                    el.innerHTML = innerHTML;
                    el.onclick = () => { previewIndex = index; updateSelection(); };
                    slideList.appendChild(el);
                });
                scrollToPreview();
            }

            function updateSelection() {
                Array.from(slideList.children).forEach((el, index) => {
                    el.classList.toggle('preview', index === previewIndex);
                    el.classList.toggle('live', index === liveIndex && activeSongId === liveSongId);
                });
                scrollToPreview();
            }

            function scrollToPreview() {
                const activeEl = slideList.children[previewIndex];
                if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function goLive(index) {
                if (index < 0 || index >= slides.length) return;
                liveIndex = index;
                previewIndex = index;
                liveSongId = activeSongId; 
                updateSelection();
                
                const slide = slides[liveIndex];
                // Push the slide content along with the current font size to the projector
                channel.postMessage({ 
                    type: 'UPDATE_SLIDE', 
                    html: formatContent(slide.content), 
                    theme: themeSelect.value,
                    fontSize: fontSizeSlider.value + 'vw'
                });
            }

            function jumpToSection(keyword) {
                const index = slides.findIndex(s => s.label.toLowerCase().includes(keyword));
                if (index !== -1) { previewIndex = index; updateSelection(); }
            }

            // Real-time projector font size updates when slider is moved
            fontSizeSlider.addEventListener('input', () => { 
                if(liveIndex !== -1) goLive(liveIndex); 
            });

            editor.addEventListener('input', parseText);
            themeSelect.addEventListener('change', () => { if(liveIndex !== -1) goLive(liveIndex); });
            chordsToggle.addEventListener('change', () => { renderSlideList(); if(liveIndex !== -1) goLive(liveIndex); });
            
            // BUG FIX: Bulletproof URL construction to fix the broken Launch button
            document.getElementById('cast-btn').addEventListener('click', () => {
                const baseUrl = window.location.href.split('?')[0].split('#')[0];
                const projectorUrl = baseUrl + '?mode=projector';
                window.open(projectorUrl, 'projectorWindow', 'width=1280,height=720');
            });

            document.addEventListener('keydown', (e) => {
                if (document.activeElement === editor) return; 

                const key = e.key.toLowerCase();
                if (key === 'arrowup') { previewIndex = Math.max(0, previewIndex - 1); updateSelection(); e.preventDefault(); }
                if (key === 'arrowdown') { previewIndex = Math.min(slides.length - 1, previewIndex + 1); updateSelection(); e.preventDefault(); }
                if (key === 'enter') { goLive(previewIndex); e.preventDefault(); }
                if (key === ' ' || key === 'arrowright') { goLive(Math.min(slides.length - 1, liveIndex + 1)); e.preventDefault(); }
                if (key === 'arrowleft') { goLive(Math.max(0, liveIndex - 1)); e.preventDefault(); }

                if (key === 'c') jumpToSection('chorus');
                if (key === 'v') jumpToSection('verse');
                if (key >= '1' && key <= '9') jumpToSection(`verse ${key}`);
                if (key === 'b') jumpToSection('bridge');
            });

            loadSong(activeSongId);
        }
    </script>
</body>
</html>
